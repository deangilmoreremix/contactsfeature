<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart CRM Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Inline bootstrap: show immediate visual marker and install global error handlers
      (function(){
        try {
          var root = document.getElementById('root');
          if (root) {
            root.innerHTML = '<div id="__inline_bootstrap" style="padding:20px;background:#fff7ed;color:#92400e;font-family:system-ui;">INLINE BOOTSTRAP: DOM ready — awaiting module execution...</div>';
          }
          window.__INLINE_BOOTSTRAP = true;

          // Unregister any service workers to avoid stale cached bundles
          if (navigator && navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
            navigator.serviceWorker.getRegistrations().then(function(regs){
              regs.forEach(function(reg){ try { reg.unregister(); console.log('SW unregistered for debug'); } catch(e){} });
            }).catch(function(){/*ignore*/});
          }

          // Global error capture: show errors in the root to surface silent failures
          window.addEventListener('error', function(evt){
            try {
              var el = document.getElementById('__inline_bootstrap');
              if (el) el.innerHTML = '<strong style="color:#b91c1c">UNCAUGHT ERROR:</strong><br>' + (evt && evt.error && evt.error.message ? evt.error.message : evt.message || String(evt));
            } catch(e){}
          });
          window.addEventListener('unhandledrejection', function(evt){
            try {
              var el = document.getElementById('__inline_bootstrap');
              if (el) el.innerHTML = '<strong style="color:#b91c1c">UNHANDLED REJECTION:</strong><br>' + (evt && evt.reason ? String(evt.reason) : 'unknown');
            } catch(e){}
          });

          console.log('INLINE BOOTSTRAP INSTALLED');
        } catch (e) {
          try { console.error('INLINE BOOTSTRAP ERROR', e); } catch(_){}
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Inline health-check: presence indicates server served latest files -->
    <meta name="x-build-id" content="
  </body>
</html>
