[build]
  publish = "dist"
  functions = "netlify/functions"
  command = "npm run build && node ./scripts/postbuild.cjs"

[build.environment]
  # Allow legacy peer deps to support Vite 8 + some plugins that haven't fully updated yet
  NPM_FLAGS = "--legacy-peer-deps"

[functions]
directory = "netlify/functions"

[dev]
targetPort = 5175

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://images.pexels.com https://*.supabase.co; connect-src 'self' https://*.supabase.co https://api.openai.com https://generativelanguage.googleapis.com; font-src 'self' data:; frame-ancestors 'none';"

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/:splat"
status = 200
